name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      # Step 5: Create auth folder (needed for storageState)
      - name: Create auth folder
        run: mkdir -p auth

      # Step 6: Debug environment variables (safe - shows only true/false)
      - name: Debug secrets
        run: |
          echo "BASE_URL is set: ${{ secrets.BASE_URL != '' }}"
          echo "VALID_USERNAME is set: ${{ secrets.VALID_USERNAME != '' }}"
          echo "VALID_PASSWORD is set: ${{ secrets.VALID_PASSWORD != '' }}"
          echo "INVALID_USERNAME is set: ${{ secrets.INVALID_USERNAME != '' }}"
          echo "INVALID_PASSWORD is set: ${{ secrets.INVALID_PASSWORD != '' }}"

      # Step 7: Run tests
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          VALID_USERNAME: ${{ secrets.VALID_USERNAME }}
          VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}
          INVALID_USERNAME: ${{ secrets.INVALID_USERNAME }}
          INVALID_PASSWORD: ${{ secrets.INVALID_PASSWORD }}

      # Step 8: Generate and Upload Allure results (always, even if tests fail)

      - name: Generate Allure Report
        run: npx allure generate allure-results --output allure-report --clean
        if: always()

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      # Step 9: Upload Playwright HTML report
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30